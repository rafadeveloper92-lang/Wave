# Publica o build Vite em GitHub Pages (site de projeto: /nome-do-repo/).
#
# Primeira vez:
# 1. Repo → Settings → Pages → Build: "GitHub Actions"
# 2. Faz merge disto na branch que dispara o workflow (main).
# 3. URL: https://<utilizador>.github.io/<nome-do-repo>/
#
# Segredos opcionais: VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY, VITE_YOUTUBE_* (Reels)

name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and build
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_YOUTUBE_API_KEY: ${{ secrets.VITE_YOUTUBE_API_KEY }}
          VITE_YOUTUBE_PLAYLIST_ID: ${{ secrets.VITE_YOUTUBE_PLAYLIST_ID }}
          VITE_YOUTUBE_SHORTS_QUERY: ${{ secrets.VITE_YOUTUBE_SHORTS_QUERY }}
        run: |
          npm ci
          npm run build

      - name: SPA fallback (rotas no cliente)
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
