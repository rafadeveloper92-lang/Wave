# Compila APK de debug (Capacitor + Gradle) e publica como artefacto do workflow.
#
# Segredos opcionais (recomendado): VITE_SUPABASE_URL, VITE_SUPABASE_ANON_KEY
# O build da app usa VITE_BASE_PATH=./ (ficheiros locais no WebView), não o caminho do GitHub Pages.

name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web (Capacitor bundle)
        env:
          VITE_BASE_PATH: ./
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms (compileSdk 36)
        run: sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: SDK path for Gradle
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Grant execute permission for Gradle
        run: chmod +x android/gradlew

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wave-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
