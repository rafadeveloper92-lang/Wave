# Workflow principal mínimo (evita erro "No event triggers defined in on").
# APK Android: workflow "Build Android APK" (build-android.yml)
# Site GitHub Pages: workflow "Deploy GitHub Pages" (deploy-pages.yml)

name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install and lint
        run: |
          npm ci
          npm run lint
